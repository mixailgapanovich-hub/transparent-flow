services:
  postgres:
    image: postgres:16-alpine
    container_name: transparent-flow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tflow
      POSTGRES_PASSWORD: tflow
      POSTGRES_DB: transparent_flow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
